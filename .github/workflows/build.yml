# Build the Sui Move IntelliJ plugin and upload the resulting zip as an artifact.
#
# Triggered on push to main and any pull request. Wrapper validation is
# performed inline by `gradle/actions/setup-gradle@v6` (no separate
# wrapper-validation step needed -- v4+ folds it in with retries).

name: Build

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.properties.outputs.version }}
      filename: ${{ steps.artifact.outputs.filename }}
    steps:
      - name: Fetch Sources
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          # Validates the Gradle wrapper inline (replaces wrapper-validation action).
          validate-wrappers: true

      - name: Read Plugin Version
        id: properties
        shell: bash
        run: |
          VERSION=$(./gradlew properties --console=plain -q | awk '/^version:/ {print $2}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build Plugin
        run: ./gradlew buildPlugin --stacktrace

      - name: Locate Plugin Artifact
        id: artifact
        shell: bash
        run: |
          ZIP=$(ls build/distributions/*.zip | head -n 1)
          echo "filename=$(basename "${ZIP%.zip}")" >> "$GITHUB_OUTPUT"
          echo "path=$ZIP" >> "$GITHUB_OUTPUT"

      - name: Upload Plugin Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.filename }}
          path: build/distributions/*.zip
          if-no-files-exist: error
          retention-days: 14

  releaseDraft:
    name: Release Draft
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [ build ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Fetch Sources
        uses: actions/checkout@v6

      - name: Download Plugin Artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build.outputs.filename }}
          path: build/distributions

      - name: Remove Old Release Drafts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/releases \
            --jq '.[] | select(.draft == true) | .id' \
            | xargs -r -I '{}' gh api -X DELETE repos/${{ github.repository }}/releases/{}

      - name: Create Release Draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ needs.build.outputs.version }}" \
            --draft \
            --title "v${{ needs.build.outputs.version }}" \
            --generate-notes \
            build/distributions/*.zip
