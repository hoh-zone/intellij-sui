# Publish the plugin to the JetBrains Marketplace when a GitHub release is
# (pre)released. Also uploads the built zip to the release page.
#
# Required secrets:
#   PUBLISH_TOKEN          - JetBrains Marketplace publish token
#   CERTIFICATE_CHAIN      - Plugin signing certificate chain (optional)
#   PRIVATE_KEY            - Plugin signing private key (optional)
#   PRIVATE_KEY_PASSWORD   - Password for PRIVATE_KEY (optional)
#
# See: https://plugins.jetbrains.com/docs/intellij/plugin-signing.html

name: Release

on:
  release:
    types: [ prereleased, released ]

jobs:

  publish:
    name: Publish Plugin
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Fetch Sources
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          validate-wrappers: true

      - name: Build Plugin
        run: ./gradlew buildPlugin --stacktrace

      - name: Publish Plugin to Marketplace
        env:
          JB_PUB_TOKEN:        ${{ secrets.PUBLISH_TOKEN }}
          CERTIFICATE_CHAIN:   ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY:         ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew publishPlugin --stacktrace

      - name: Upload Plugin Zip to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" build/distributions/*.zip --clobber
